<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design 2 — Jeu de mémoire | Binta Bah</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --cream:#F5F0E8; --sand:#EDE5D4; --warm:#D4C5A9; --terracotta:#B5784A; --charcoal:#2C2925; --ink:#4A4540; --muted:#8A8178; --white:#FDFAF5; }
    body { background: var(--cream); color: var(--charcoal); font-family: 'DM Sans', sans-serif; font-weight: 300; line-height: 1.75; min-height: 100vh; display: flex; flex-direction: column; }
    h1,h2,h3 { font-family: 'Cormorant Garamond', serif; font-weight: 600; }
    .navbar { background: var(--white); border-bottom: 1px solid var(--warm); padding: 1.2rem 0; }
    .navbar-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--charcoal) !important; }
    .nav-link { color: var(--ink) !important; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 400; }
    .nav-link:hover { color: var(--terracotta) !important; }
    .placeholder-hero { background: #D6E0D8; min-height: 60vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 4rem 2rem; }
    .badge-coming { background: var(--white); color: var(--terracotta); border: 1.5px solid var(--terracotta); font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.4rem 1rem; font-family: 'DM Sans', sans-serif; font-weight: 500; display: inline-block; margin-bottom: 1.5rem; }
    .placeholder-number { font-family: 'Cormorant Garamond', serif; font-size: 7rem; color: var(--warm); line-height: 1; font-weight: 600; }
    .placeholder-title { font-size: clamp(2rem, 5vw, 3.5rem); color: var(--charcoal); margin-bottom: 1rem; }
    .placeholder-desc { font-size: 1rem; color: var(--ink); max-width: 480px; margin: 0 auto 2rem; }
    .btn-back { background: var(--charcoal); color: var(--white); border: none; padding: 0.8rem 2rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; display: inline-block; transition: background 0.25s; }
    .btn-back:hover { background: var(--terracotta); color: var(--white); }
    footer { background: var(--charcoal); color: var(--warm); padding: 2rem 0; text-align: center; margin-top: auto; }
    footer p { font-size: 0.85rem; color: var(--muted); margin: 0; }
    footer a { color: var(--warm); text-decoration: none; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; display: block; margin-bottom: 0.4rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">B. Bah</a>
      <div class="ms-auto">
        <a class="nav-link d-inline" href="index.html#designs">← Retour aux projets</a>
      </div>
    </div>
  </nav>

  <div class="placeholder-hero flex-grow-1">
    <span class="badge-coming">À venir</span>
    <div class="placeholder-number">02</div>
    <h1 class="placeholder-title">Jeu de mémoire</h1>
    <p class="placeholder-desc">Interface interactive d'un jeu de mémoire. L'objectif est de concevoir une expérience de jeu engageante, accessible et visuellement cohérente avec les principes UI/UX.</p>
    <a href="index.html" class="btn-back">← Retour au portfolio</a>
  </div>

  <footer>
    <div class="container">
      <a href="index.html">Binta Bah</a>
      <p>SEG3525 — Université d'Ottawa · Été 2026</p>
    </div>
  </footer>
</body>
</html>
